services:
  mysql:
    image: mysql:8.0
    container_name: borneo_mysql
    environment:
      MYSQL_DATABASE: db_borneo
      MYSQL_ROOT_PASSWORD: RizkySusu
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  mqtt_broker:
    build: ./mosquitto
    container_name: borneo_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    environment:
      - MOSQUITTO_USERNAME=${MQTT_USERNAME:-borneo_backend}
      - MOSQUITTO_PASSWORD=${MQTT_PASSWORD:-""}
    restart: always

  app:
    build: .
    container_name: borneo_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=mysql+pymysql://root:RizkySusu@mysql:3306/db_borneo
      - MQTT_BROKER=mqtt_broker
      - MQTT_USERNAME=${MQTT_USERNAME:-borneo_backend}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD is required. Set it in .env or docker-compose override.}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mysql
      - mqtt_broker
    restart: always

volumes:
  mysql_data:
